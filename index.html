<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Xace · Protected Report</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{--purple-3:#0f0917;--lime:#C9F420;--lp:#CCB8E6;--card:#241534;--card-2:#2c1c40;
  --line:rgba(204,184,230,.16);--txt:#F3EEFA;--mut:#B7A6CF;--bad:#FF6B6B;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;min-height:100vh;display:grid;place-items:center;
  color:var(--txt);padding:24px;
  background:radial-gradient(900px 600px at 20% -10%,#3a2352 0%,transparent 55%),
             radial-gradient(800px 500px at 100% 0%,#241a3a 0%,transparent 50%),var(--purple-3);}
.card{width:100%;max-width:420px;background:linear-gradient(180deg,var(--card-2),var(--card));
  border:1px solid var(--line);border-radius:20px;padding:38px 34px;
  box-shadow:0 30px 60px -24px rgba(0,0,0,.7);text-align:center}
.logo{height:26px;margin-bottom:26px;opacity:.97}
.lock{width:46px;height:46px;border-radius:13px;display:grid;place-items:center;margin:0 auto 18px;
  background:rgba(201,244,32,.1);border:1px solid rgba(201,244,32,.28)}
.lock svg{width:22px;height:22px;stroke:var(--lime);fill:none;stroke-width:2}
h1{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;letter-spacing:-.02em;margin-bottom:8px}
p.sub{font-size:13.5px;color:var(--mut);margin-bottom:26px;line-height:1.5}
.field{position:relative;margin-bottom:14px}
input{width:100%;padding:14px 46px 14px 16px;font-size:15px;font-family:inherit;color:var(--txt);
  background:rgba(15,9,23,.55);border:1px solid var(--line);border-radius:12px;outline:none;transition:.2s}
input:focus{border-color:rgba(201,244,32,.5);box-shadow:0 0 0 3px rgba(201,244,32,.1)}
input::placeholder{color:#7a6b96}
.eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;
  background:none;border:none;padding:6px;display:grid;place-items:center}
.eye svg{width:18px;height:18px;stroke:var(--mut);fill:none;stroke-width:2}
button.go{width:100%;padding:14px;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;
  color:var(--purple-3);background:var(--lime);border:none;border-radius:12px;transition:.2s;
  display:flex;align-items:center;justify-content:center;gap:9px}
button.go:hover{filter:brightness(1.06)}
button.go:disabled{opacity:.6;cursor:default}
.err{color:var(--bad);font-size:13px;margin-top:14px;min-height:18px;opacity:0;transition:.2s}
.err.show{opacity:1}
.foot{margin-top:24px;font-size:11.5px;color:#6f6090;line-height:1.5}
.spinner{width:16px;height:16px;border:2px solid rgba(15,9,23,.35);border-top-color:var(--purple-3);
  border-radius:50%;animation:spin .7s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}
.shake{animation:sh .4s}
@keyframes sh{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-7px)}40%,80%{transform:translateX(7px)}}
</style>
</head>

const b64d = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
const $ = id => document.getElementById(id);

$('toggle').addEventListener('click', () => {
  const i = $('pw'); i.type = i.type === 'password' ? 'text' : 'password'; i.focus();
});

async function unlock(pw){
  const salt = b64d(P.salt), iv = b64d(P.iv), ct = b64d(P.ct);
  const base = await crypto.subtle.importKey('raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey(
    {name:'PBKDF2', salt, iterations:P.iter, hash:'SHA-256'},
    base, {name:'AES-GCM', length:256}, false, ['decrypt']);
  const buf = await crypto.subtle.decrypt({name:'AES-GCM', iv}, key, ct);
  return new TextDecoder().decode(buf);
}

$('form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const pw = $('pw').value;
  if(!pw) return;
  $('btn').disabled = true; $('btnlabel').textContent = 'Decrypting'; $('spin').style.display='block';
  $('err').classList.remove('show');
  try {
    const html = await unlock(pw);
    document.open(); document.write(html); document.close();
  } catch (err) {
    $('btn').disabled = false; $('btnlabel').textContent = 'Unlock'; $('spin').style.display='none';
    $('err').textContent = 'Incorrect password. Please try again.';
    $('err').classList.add('show');
    $('card').classList.remove('shake'); void $('card').offsetWidth; $('card').classList.add('shake');
    $('pw').select();
  }
});
</script>
